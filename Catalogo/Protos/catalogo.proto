syntax = "proto3";

option csharp_namespace = "Catalogo.Protos";

package catalogo;

service CatalogoService {
  rpc ObtenerProducto (GetProductoRequest) returns (ProductoResponse);
  rpc ActualizarStock (UpdateStockRequest) returns (UpdateStockResponse);
}

message GetProductoRequest {
  string id = 1;
}

message ProductoResponse {
  string producto_id = 1;
  string nombre = 2;
  double precio = 3;
  int32 stock = 4;
  bool isactive = 5;
}

message UpdateStockRequest {
  string id = 1;
  int32 cantidad = 2;
  string accion = 3;
}

message UpdateStockResponse {
  bool success = 1;
  string mensaje = 2;
}